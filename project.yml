name: SpotifyLyricsAssistant
options:
  bundleIdPrefix: com.spotifylyrics
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: SpotifyLyricsAssistant
    PRODUCT_BUNDLE_IDENTIFIER: com.spotifylyrics.assistant
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_ENTITLEMENTS: SpotifyLyricsAssistant/Resources/SpotifyLyricsAssistant.entitlements
    INFOPLIST_FILE: SpotifyLyricsAssistant/Resources/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    COMBINE_HIDPI_IMAGES: YES

targets:
  SpotifyLyricsAssistant:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: SpotifyLyricsAssistant
        excludes:
          - "Resources/Info.plist"
          - "Resources/SpotifyLyricsAssistant.entitlements"
    resources:
      - path: SpotifyLyricsAssistant/Resources/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: SpotifyLyricsAssistant/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: SpotifyLyricsAssistant/Resources/SpotifyLyricsAssistant.entitlements
        SWIFT_VERSION: "6.0"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
